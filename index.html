<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water - Make Waves Around the World</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header/Navigation -->
    <header>
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">💧</span>
                <span class="logo-text">charity: water</span>
            </div>
            <nav class="navbar">
                <a href="#about">About Us</a>
                <a href="#mission">Our Mission</a>
                <a href="#news">News & Stories</a>
                <a href="#partnerships">Partnerships</a>
            </nav>
            <div class="header-buttons">
                <button class="btn btn-subscribe">Subscribe</button>
                <button class="btn btn-primary">Join Us</button>
            </div>
        </div>
    </header>

    <!-- Main Section -->
    <main>
        <section class="hero">
            <div class="hero-container">
                <!-- Left Content -->
                <div class="hero-content">
                    <h1>Make Waves Around the World.</h1>
                    <p class="hero-description">
                        Help change the lives of those who need safe and clean drinking water. 
                        100% of public donations go directly to water projects.
                    </p>

                    <!-- Donation Type Selection -->
                    <div class="donation-section">
                        <label class="donation-label">Donation type:</label>
                        <div class="donation-buttons">
                            <button class="btn-donation-type active">One Time</button>
                            <button class="btn-donation-type">Monthly</button>
                        </div>
                    </div>

                    <!-- Donation Amounts -->
                    <div class="donation-amounts">
                        <button class="btn-amount">$10</button>
                        <button class="btn-amount">$50</button>
                        <button class="btn-amount">$20</button>
                        <button class="btn-amount">Other Amount</button>
                    </div>

                    <!-- Call to Action Button -->
                    <button class="btn btn-cta">Give Water Today</button>

                    <!-- Social Media -->
                    <div class="social-section">
                        <p class="social-text">Join us at:</p>
                        <div class="social-icons">
                            <a href="#" class="social-icon">f</a>
                            <a href="#" class="social-icon">𝕏</a>
                            <a href="#" class="social-icon">📷</a>
                            <a href="#" class="social-icon">👻</a>
                            <a href="#" class="social-icon">🎵</a>
                            <a href="#" class="social-icon">in</a>
                        </div>
                    </div>
                </div>

                <!-- Right Image -->
                <div class="hero-image">
                    <img src="image.jpg" alt="Help providing clean water">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
